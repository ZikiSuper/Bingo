<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bingo</title>
<meta name="description" content="Sorteador de bingo com roleta visual, voz e exportação de relatório.">
<meta name="theme-color" content="#000000">

<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
  :root{
    --bg:#000;
    --panel:#111;
    --cell-border:#555;
    --overlay-bg:rgba(0,0,0,0.88);
    --text:#fff;
    --muted:#999;
    --cell-padding: 8px;
    --cell-min-width: 44px;
    --cell-height: 44px;
    --font-display: clamp(60px, 12vw, 160px);
    --overlay-font: 160px;
    --roulette-stop-delay: 120;
    --dialog-focus-delay: 100;
  }

  body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:var(--bg);
    color:var(--text);
  }

  .topo{
    text-align:center;
    padding:10px;
    background:var(--panel);
  }

  button{
    padding:10px 18px;
    margin:5px;
    border-radius:8px;
    border:1px solid #fff;
    cursor:pointer;
    font-weight:bold;
    background:#fff;
    color:#000;
    transition: background 0.2s ease, color 0.2s ease;
  }

  button:focus-visible{
    outline:2px solid #4da6ff;
    outline-offset:2px;
  }

  button.active{
    background:#000;
    color:#fff;
    border-color:#fff;
  }

  button:hover{
    background:#eaeaea;
  }

  button:disabled{
    opacity:0.6;
    cursor:not-allowed;
  }

  .display{
    display:flex;
    align-items:center;
    justify-content:center;
    height:30vh;
    font-weight:bold;
    font-size:var(--font-display);
    color:#fff;
  }

  .counter{
    text-align:center;
    padding:8px;
    font-size:14px;
    color:var(--muted);
  }

  .historico{
    text-align:center;
    padding:10px;
    overflow-x:auto;
  }

  .item{
    display:inline-block;
    margin:4px;
    font-size:22px;
    color:#fff;
  }

  table{
    margin:10px auto;
    border-collapse:collapse;
    max-width:95%;
    overflow:auto;
  }

  td, th{
    border:3px solid var(--cell-border);
    padding:var(--cell-padding);
    text-align:center;
    font-weight:bold;
    min-width:var(--cell-min-width);
    height:var(--cell-height);
    color:#fff !important;
    background:rgba(255,255,255,0.04);
    transition:background .12s ease, transform .12s ease, box-shadow .12s ease;
  }

  td.letra{
    background:#111;
    color:#fff;
    width:48px;
  }

  td.destacado{
    background:#fff;
    color:#000 !important;
    box-shadow:0 0 12px rgba(255,255,255,0.5);
  }

  td.roulette{
    background:#d9d9d9;
    color:#000 !important;
    transform:scale(1.08);
    box-shadow:0 0 18px rgba(255,255,255,0.85);
  }

  #overlay{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:var(--overlay-font);
    background:var(--overlay-bg);
    opacity:0;
    pointer-events:none;
    transition:opacity .12s ease, transform .12s ease;
    color:#fff;
    text-shadow:0 6px 24px rgba(0,0,0,0.8);
    z-index:9999;
    transform:scale(.98);
  }

  #overlay.show{
    opacity:1;
    pointer-events:auto;
    transform:scale(1);
  }

  .dialog-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:10000;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.2s ease;
  }

  .dialog-overlay.show{
    opacity:1;
    pointer-events:auto;
  }

  .dialog{
    background:#222;
    border:2px solid #fff;
    border-radius:12px;
    padding:24px;
    max-width:400px;
    width:90%;
    box-shadow:0 8px 32px rgba(0,0,0,0.5);
  }

  .dialog h3{
    margin:0 0 16px 0;
    font-size:18px;
    color:#fff;
  }

  .dialog input{
    width:100%;
    padding:10px;
    margin:12px 0;
    border:1px solid #666;
    border-radius:6px;
    background:#111;
    color:#fff;
    font-size:16px;
    box-sizing:border-box;
  }

  .dialog input:focus{
    outline:none;
    border-color:#fff;
    box-shadow:0 0 8px rgba(255,255,255,0.3);
  }

  .dialog-buttons{
    display:flex;
    gap:12px;
    margin-top:20px;
    justify-content:flex-end;
  }

  .dialog-buttons button{
    padding:10px 16px;
    margin:0;
    flex:1;
    max-width:120px;
  }

  @media (prefers-reduced-motion: reduce){
    * { animation:none !important; transition:none !important; }
  }

  @media (max-width:900px){
    :root {
      --cell-padding: 6px;
      --cell-min-width: 36px;
      --cell-height: 36px;
      --font-display: clamp(48px, 18vw, 120px);
      --overlay-font: 96px;
    }
  }

  @media (max-width:768px){
    .topo{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      padding:12px;
    }

    button{
      padding:14px 12px;
      margin:0;
      font-size:14px;
      min-height:48px;
      width:100%;
    }

    button:hover{
      background:#d4d4d4;
    }
  }

  @media (max-width:600px){
    :root {
      --cell-padding: 5px;
      --cell-min-width: 30px;
      --cell-height: 30px;
      --font-display: clamp(48px, 20vw, 100px);
      --overlay-font: 72px;
    }

    .topo{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      padding:10px;
    }

    button{
      padding:16px 8px;
      font-size:13px;
      min-height:50px;
      width:100%;
      margin:0;
    }

    .item{
      font-size:18px;
      margin:3px;
    }

    table{
      max-width:100%;
      margin:8px auto;
    }

    td.letra{
      width:36px;
    }
  }

  @media (max-width:480px){
    :root {
      --cell-padding: 4px;
      --cell-min-width: 26px;
      --cell-height: 26px;
      --font-display: clamp(36px, 18vw, 100px);
    }

    button{
      padding:14px 6px;
      font-size:12px;
      min-height:48px;
    }

    .display{
      height:18vh;
    }

    .topo{
      gap:6px;
      padding:8px;
    }
  }

  @media (max-width:390px){
    :root {
      --cell-padding: 3px;
      --cell-min-width: 24px;
      --cell-height: 24px;
      --font-display: clamp(36px, 16vw, 80px);
      --overlay-font: 60px;
    }

    .topo{
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      padding: 6px;
    }

    button{
      padding: 12px 4px;
      font-size: 11px;
      min-height: 44px;
      margin: 0;
    }

    .display{
      height: 18vh;
    }

    td.letra{
      width: 32px;
    }

    .item{
      font-size: 16px;
      margin: 2px;
    }

    .dialog{
      max-width: 100%;
      width: 95%;
      padding: 16px;
    }

    .dialog h3{
      font-size: 16px;
      margin-bottom: 12px;
    }

    .dialog input{
      font-size: 16px;
      padding: 12px;
      margin: 10px 0;
    }

    .dialog-buttons{
      gap: 8px;
      margin-top: 16px;
    }

    .dialog-buttons button{
      padding: 10px 12px;
      max-width: 100%;
      flex: 1;
    }
  }

  @media (max-width:320px){
    :root {
      --cell-padding: 2px;
      --cell-min-width: 20px;
      --cell-height: 20px;
      --font-display: clamp(32px, 14vw, 64px);
      --overlay-font: 48px;
    }

    button{
      padding: 10px 2px;
      font-size: 10px;
      min-height: 40px;
    }

    .dialog h3{
      font-size: 14px;
    }
  }
</style>
</head>
<body>
  <div class="topo">
    <button id="btnSortear" aria-label="Sortear um novo número">🎲 Sortear</button>
    <button id="btnRepetir" aria-label="Repetir o último número sorteado">🔁 Repetir</button>
    <button id="btnModo" aria-label="Alternar entre modo desktop e mobile">🖥️ / 📱 Modo</button>
    <button id="btnAuto" aria-label="Ativar modo de sorteio automático">🎤 Auto</button>
    <button id="btnNovo" aria-label="Iniciar uma nova rodada de sorteios">🔄 Nova Rodada</button>
    <button id="btnPDF" aria-label="Exportar relatório em PDF">📄 PDF</button>
  </div>

  <div class="counter" id="counter">0 de 75 números sorteados</div>
  <div class="display" id="display" role="status" aria-live="polite">--</div>
  <div class="historico" id="lista" role="region" aria-label="Histórico de números sorteados"></div>
  <table role="grid" aria-label="Tabela de números do bingo"><tbody id="numeros"></tbody></table>
  <div id="overlay" aria-live="assertive" aria-hidden="true" role="status"></div>

  <div id="dialogOverlay" class="dialog-overlay" role="dialog" aria-modal="true">
    <div class="dialog">
      <h3 id="dialogTitle">Tempo entre sorteios</h3>
      <input type="number" id="dialogInput" min="0.5" step="0.5" placeholder="Segundos" aria-label="Tempo em segundos" />
      <div class="dialog-buttons">
        <button id="dialogCancel" aria-label="Cancelar diálogo">Cancelar</button>
        <button id="dialogOk" aria-label="Confirmar entrada">OK</button>
      </div>
    </div>
  </div>

<script>
/**
 * Constantes de configuração e timing
 */
const CONFIG_DELAYS = {
  ROULETTE_STOP: 120,
  DIALOG_FOCUS: 100
};

/**
 * Sistema de gerenciamento de síntese de fala
 */
class SpeechManager {
  constructor() {
    this.isSupported = "speechSynthesis" in window;
  }

  /**
   * Fala um texto
   * @param {string} text - Texto para falar
   * @param {string} lang - Idioma (padrão: pt-BR)
   * @param {number} rate - Velocidade (padrão: 0.8)
   * @returns {Promise<void>}
   */
  async speak(text, lang = "pt-BR", rate = 0.8) {
    if (!this.isSupported) return;
    
    return new Promise((resolve) => {
      try {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = lang;
        utterance.rate = rate;
        utterance.onend = resolve;
        utterance.onerror = () => {
          console.warn("Erro ao falar:", text);
          resolve();
        };
        speechSynthesis.speak(utterance);
      } catch (e) {
        console.warn("Erro ao iniciar fala:", e);
        resolve();
      }
    });
  }

  /**
   * Cancela a fala atual
   */
  cancel() {
    if (this.isSupported) {
      try {
        speechSynthesis.cancel();
      } catch (e) {
        console.warn("Erro ao cancelar fala:", e);
      }
    }
  }
}

/**
 * Gerenciador de cache de elementos DOM
 */
class ElementCache {
  constructor() {
    this.cache = new Map();
  }

  get(id) {
    if (!this.cache.has(id)) {
      const element = document.getElementById(id);
      if (!element) {
        console.warn(`Elemento não encontrado: ${id}`);
      }
      this.cache.set(id, element);
    }
    return this.cache.get(id);
  }

  clear() {
    this.cache.clear();
  }
}

/**
 * Gerenciador de LocalStorage
 */
class StorageManager {
  static save(key, data) {
    try {
      localStorage.setItem(`bingo_${key}`, JSON.stringify(data));
    } catch (e) {
      console.warn("Erro ao salvar no localStorage:", e);
    }
  }

  static load(key) {
    try {
      const data = localStorage.getItem(`bingo_${key}`);
      return data ? JSON.parse(data) : null;
    } catch (e) {
      console.warn("Erro ao carregar do localStorage:", e);
      return null;
    }
  }

  static clear(key) {
    try {
      localStorage.removeItem(`bingo_${key}`);
    } catch (e) {
      console.warn("Erro ao limpar localStorage:", e);
    }
  }
}

document.addEventListener("DOMContentLoaded", () => {
  // ========== CONSTANTES ==========
  const LETTERS = ["B", "I", "N", "G", "O"];

  const CONFIG = {
    TOTAL_NUMBERS: 75,
    ROWS: 5,
    COLS: 15,
    ANIMATION: { duration: 700, easing: "ease-out" },
    AUDIO: { rate: 0.8 },
    TIMING: {
      totalDuration: 2200,
      letterNumberPause: 180,
      dramaticPause: 220
    },
    HISTORY_SIZE: 5,
    AUTO_DELAY_DEFAULT: 5000,
    ROULETTE_TICK: 60
  };

  const STRINGS = {
    ORG_NAME: "ASSOCIAÇÃO DE PAIS E MESTRES",
    DOC_TITLE: "ATA DE APURAÇÃO DO BINGO",
    EVENT_NAME: "Bingo",
    EMISSION_DATE: "Data/Hora de emissão: ",
    NO_ROUNDS_RECORDED: "Nenhuma rodada foi registrada até o momento.",
    NO_NUMBERS_DRAWN: "Nenhum número sorteado nesta rodada.",
    CONTINUATION: "(continuação)",
    ROUND: "Rodada ",
    PERFORMED_AT: "Realizada em: ",
    TOTAL_DRAWN: "Total de números sorteados: ",
    RESPONSIBLE: "Responsável pela APM",
    SCHOOL_DIRECTION: "Direção Escolar",
    AUTO_GENERATED: "Documento oficial gerado automaticamente para conferência do sorteio.",
    JSPDF_NOT_FOUND: "Biblioteca jsPDF não encontrada.",
    PAGE: "Página ",
    OF: " de ",
    INVALID_TIME: "Informe um valor válido (maior que 0)."
  };

  // ========== STATE ==========
  const state = {
    sorteados: new Set(), // MELHORIA 1: Usar Set para O(1) lookup
    modo: "pc",
    ultimoSorteado: null,
    rodadas: [],
    rodadaAtual: 1,
    rodando: false,
    autoMode: false,
    autoDelayMs: CONFIG.AUTO_DELAY_DEFAULT,
    historico: []
  };

  // ========== INSTANCES ==========
  const speechManager = new SpeechManager();
  const elementCache = new ElementCache();
  const $ = id => document.getElementById(id);

  // ========== DOM ELEMENTS ==========
  const display = $("display");
  const counter = $("counter"); // MELHORIA 2: Contador visual
  const lista = $("lista");
  const overlay = $("overlay");
  const tbody = $("numeros");
  const btnSortear = $("btnSortear");
  const btnRepetir = $("btnRepetir");
  const btnModo = $("btnModo");
  const btnAuto = $("btnAuto");
  const btnNovo = $("btnNovo");
  const btnPDF = $("btnPDF");

  // ========== BROWSER CAPABILITIES ==========
  const hasBroadcastChannel = "BroadcastChannel" in window;
  const canal = hasBroadcastChannel ? new BroadcastChannel("bingo_bingo_sync") : null;

  // ========== UTILITIES ==========
  const delay = ms => new Promise(r => setTimeout(r, ms));

  /**
   * Atualiza o contador visual de números sorteados
   */
  const updateCounter = () => {
    if (counter) {
      counter.textContent = `${state.sorteados.size} de ${CONFIG.TOTAL_NUMBERS} números sorteados`;
    }
  };

  /**
   * Retorna a letra (B, I, N, G, O) correspondente ao número
   * @param {number} n - Número de 1 a 75
   * @returns {string} Uma das letras B, I, N, G, O
   */
  const getLetterFromNumber = n => {
    if (n <= 15) return "B";
    if (n <= 30) return "I";
    if (n <= 45) return "N";
    if (n <= 60) return "G";
    return "O";
  };

  /**
   * Gera um número aleatório não sorteado (MELHORIA 1: O(1) com Set)
   * @returns {number} Número entre 1 e 75
   */
  const generateRandomNumber = () => {
    let number;
    do {
      number = Math.floor(Math.random() * CONFIG.TOTAL_NUMBERS) + 1;
    } while (state.sorteados.has(number)); // Set.has() é O(1)
    return number;
  };

  /**
   * Atualiza o display principal
   * @param {string} txt - Texto a exibir
   * @param {string} cls - Classe CSS (letra)
   */
  const updateDisplay = (txt, cls) => {
    if (display) {
      display.innerHTML = `<span class="${cls}">${txt}</span>`;
    }
  };

  /**
   * Renderiza o histórico de números sorteados
   */
  const renderHistory = () => {
    if (lista) {
      lista.innerHTML = "";
      state.historico.forEach(item => {
        const el = document.createElement("div");
        el.className = "item " + item.cls;
        el.innerText = item.txt;
        lista.appendChild(el);
      });
    }
  };

  /**
   * Adiciona um número ao histórico
   * @param {string} txt - Texto do número
   * @param {string} cls - Classe CSS (letra)
   */
  const addToHistory = (txt, cls) => {
    state.historico.unshift({ txt, cls });
    state.historico = state.historico.slice(0, CONFIG.HISTORY_SIZE);
    renderHistory();
  };

  /**
   * Mostra o overlay com o número
   * @param {string} txt - Número para exibir
   */
  const showOverlay = txt => {
    if (overlay) {
      overlay.textContent = txt;
      overlay.classList.add("show");
      overlay.setAttribute("aria-hidden", "false");
    }
  };

  /**
   * Esconde o overlay
   */
  const hideOverlay = () => {
    if (overlay) {
      overlay.classList.remove("show");
      overlay.setAttribute("aria-hidden", "true");
    }
  };

  /**
   * Mostra um diálogo customizado
   * @param {string} title - Título do diálogo
   * @param {Object} options - Opções { min, max, step, defaultValue }
   * @returns {Promise<number|null>} Valor inserido ou null
   */
  const showDialog = (title, options = {}) => {
    const { min = 0.5, max = 999, step = 0.5, defaultValue = "" } = options;

    return new Promise(resolve => {
      try {
        const dialogOverlay = $("dialogOverlay");
        const dialogTitle = $("dialogTitle");
        const dialogInput = $("dialogInput");
        const dialogOk = $("dialogOk");
        const dialogCancel = $("dialogCancel");

        if (!dialogOverlay || !dialogTitle || !dialogInput || !dialogOk || !dialogCancel) {
          resolve(null);
          return;
        }

        dialogTitle.textContent = title;
        dialogInput.value = defaultValue;
        dialogInput.min = min;
        dialogInput.max = max;
        dialogInput.step = step;

        const cleanup = () => {
          dialogOverlay.classList.remove("show");
          dialogOk.removeEventListener("click", handleOk);
          dialogCancel.removeEventListener("click", handleCancel);
          dialogInput.removeEventListener("keypress", handleKeypress);
        };

        const handleOk = () => {
          const value = parseFloat(dialogInput.value);
          if (isNaN(value) || value < min || value > max) {
            alert(`${STRINGS.INVALID_TIME} (mín: ${min}, máx: ${max})`);
            return;
          }
          cleanup();
          resolve(value);
        };

        const handleCancel = () => {
          cleanup();
          resolve(null);
        };

        const handleKeypress = (e) => {
          if (e.key === "Enter") handleOk();
          if (e.key === "Escape") handleCancel();
        };

        dialogOk.addEventListener("click", handleOk);
        dialogCancel.addEventListener("click", handleCancel);
        dialogInput.addEventListener("keypress", handleKeypress);

        dialogOverlay.classList.add("show");
        setTimeout(() => dialogInput.focus(), CONFIG_DELAYS.DIALOG_FOCUS);
      } catch (e) {
        console.warn("Erro no diálogo:", e);
        resolve(null);
      }
    });
  };

  /**
   * Marca uma célula da tabela como sorteada
   * @param {number} n - Número da célula
   */
  const markCell = (n) => {
    try {
      const el = elementCache.get("n" + n);
      if (!el) return;

      el.classList.add("destacado");
      el.classList.remove("roulette");

      try {
        el.animate(
          [
            { transform: "scale(1.08)", boxShadow: "0 0 22px rgba(255,255,255,0.9)" },
            { transform: "scale(1)", boxShadow: "0 0 8px rgba(255,255,255,0.35)" }
          ],
          { duration: CONFIG.ANIMATION.duration, iterations: 1, easing: CONFIG.ANIMATION.easing }
        );
      } catch (e) {
        console.warn("Erro na animação:", e);
      }
    } catch (e) {
      console.warn("Erro ao marcar célula:", e);
    }
  };

  /**
   * Gera a tabela de bingo
   */
  const generateTable = () => {
    try {
      if (!tbody) return;
      
      let html = "";

      if (state.modo === "pc") {
        for (let l = 0; l < CONFIG.ROWS; l++) {
          html += "<tr><td class='letra'>" + LETTERS[l] + "</td>";
          for (let c = 0; c < CONFIG.COLS; c++) {
            const num = l * CONFIG.COLS + c + 1;
            html += `<td id="n${num}" class="${LETTERS[l]}">${num}</td>`;
          }
          html += "</tr>";
        }
      } else {
        html += "<tr>" + LETTERS.map(h => `<th>${h}</th>`).join("") + "</tr>";
        for (let i = 1; i <= CONFIG.COLS; i++) {
          html += "<tr>";
          html += `<td id="n${i}" class="B">${i}</td>`;
          html += `<td id="n${i + 15}" class="I">${i + 15}</td>`;
          html += `<td id="n${i + 30}" class="N">${i + 30}</td>`;
          html += `<td id="n${i + 45}" class="G">${i + 45}</td>`;
          html += `<td id="n${i + 60}" class="O">${i + 60}</td>`;
          html += "</tr>";
        }
      }

      tbody.innerHTML = html;
      elementCache.clear();
      // MELHORIA 1: Iterar sobre Set (compatível com forEach)
      state.sorteados.forEach(n => {
        const el = elementCache.get("n" + n);
        if (el) el.classList.add("destacado");
      });
    } catch (e) {
      console.error("Erro ao gerar tabela:", e);
    }
  };

  /**
   * Fala partes de forma dramática com pausas
   * @param {string[]} parts - Partes para falar
   * @param {Function} onPartEnd - Callback ao final de cada parte
   * @returns {Promise<void>}
   */
  const dramaticSpeak = async (parts = ["Agora...", "O número é"], onPartEnd = null) => {
    try {
      const queue = [...parts];
      let index = 0;

      while (queue.length > 0) {
        const partIndex = index++;
        await speechManager.speak(queue.shift(), "pt-BR", CONFIG.AUDIO.rate);

        if (typeof onPartEnd === "function") {
          try {
            onPartEnd(partIndex);
          } catch (e) {
            console.warn("Erro no callback:", e);
          }
        }

        if (queue.length > 0) {
          await delay(CONFIG.TIMING.dramaticPause);
        }
      }
    } catch (e) {
      console.warn("Erro na fala dramática:", e);
    }
  };

  /**
   * Fala o número com sua letra
   * @param {number} n - Número para falar
   * @returns {Promise<void>}
   */
  const speakNumber = async (n) => {
    try {
      const letterMap = { B: "bê", I: "i", N: "ene", G: "gê", O: "ó" };
      const letter = getLetterFromNumber(n);
      const letterText = letterMap[letter] || letter;

      await speechManager.speak(letterText, "pt-BR", CONFIG.AUDIO.rate);
      await delay(CONFIG.TIMING.letterNumberPause);
      await speechManager.speak(n.toLocaleString("pt-BR"), "pt-BR", CONFIG.AUDIO.rate);
    } catch (e) {
      console.warn("Erro ao falar número:", e);
    }
  };

  /**
   * Inicia a roleta visual na tabela
   * @param {number} tickInterval - Intervalo em ms
   * @returns {Object} { promise, stop }
   */
  const startTableRoulette = (tickInterval = CONFIG.ROULETTE_TICK) => {
    let intervalId = null;
    let prevEl = null;
    let stopped = false;
    let resolvePromise;

    const promise = new Promise(r => {
      resolvePromise = r;
    });

    try {
      intervalId = setInterval(() => {
        if (stopped) return;
        if (prevEl) prevEl.classList.remove("roulette");

        const num = Math.floor(Math.random() * CONFIG.TOTAL_NUMBERS) + 1;
        const el = elementCache.get("n" + num);
        if (el) {
          el.classList.add("roulette");
          prevEl = el;
        }
      }, tickInterval);
    } catch (e) {
      console.error("Erro ao iniciar roleta:", e);
    }

    const stop = (finalNum) => {
      if (stopped) return;
      stopped = true;
      if (intervalId) clearInterval(intervalId);

      if (prevEl) prevEl.classList.remove("roulette");

      const finalEl = elementCache.get("n" + finalNum);
      if (finalEl) {
        finalEl.classList.add("roulette");
        setTimeout(() => finalEl.classList.remove("roulette"), CONFIG_DELAYS.ROULETTE_STOP);
      }

      resolvePromise();
    };

    return { promise, stop };
  };

  /**
   * Cria snapshot do estado (MELHORIA 1: Converter Set para Array para storage)
   * @returns {Object} Estado serializado
   */
  const snapshotState = () => ({
    sorteados: Array.from(state.sorteados), // Set → Array para JSON
    modo: state.modo,
    ultimoSorteado: state.ultimoSorteado,
    rodadas: state.rodadas.map(r => ({
      numero: r.numero,
      sorteados: [...r.sorteados],
      data: r.data
    })),
    rodadaAtual: state.rodadaAtual,
    historico: state.historico.map(h => ({ txt: h.txt, cls: h.cls })),
    autoMode: state.autoMode,
    autoDelayMs: state.autoDelayMs
  });

  /**
   * Restaura o estado do snapshot (MELHORIA 1: Array → Set)
   * @param {Object} snapshot - Estado serializado
   */
  const restoreFromSnapshot = (snapshot) => {
    try {
      state.sorteados = new Set(snapshot.sorteados || []);
      state.modo = snapshot.modo || "pc";
      state.ultimoSorteado = snapshot.ultimoSorteado ?? null;
      state.rodadas = (snapshot.rodadas || []).map(r => ({
        numero: r.numero,
        sorteados: [...(r.sorteados || [])],
        data: r.data
      }));
      state.rodadaAtual = snapshot.rodadaAtual || 1;
      state.historico = (snapshot.historico || []).map(h => ({ txt: h.txt, cls: h.cls }));
      if (typeof snapshot.autoMode === "boolean") state.autoMode = snapshot.autoMode;
      if (typeof snapshot.autoDelayMs === "number") state.autoDelayMs = snapshot.autoDelayMs;
    } catch (e) {
      console.warn("Erro ao restaurar estado:", e);
    }
  };

  /**
   * Publica o estado para outras abas
   */
  const publishState = () => {
    if (canal) {
      try {
        canal.postMessage({ type: "state", payload: snapshotState() });
      } catch (e) {
        console.warn("Erro ao publicar estado:", e);
      }
    }
  };

  /**
   * Atualiza o botão auto mode
   */
  const updateAutoButton = () => {
    if (btnAuto) {
      btnAuto.classList.toggle("active", state.autoMode);
      btnAuto.textContent = state.autoMode ? "⏹ Auto" : "🎤 Auto";
    }
  };

  // ========== SYNC ENTRE ABAS ==========
  let autoTimer = null;

  if (canal) {
    canal.onmessage = (ev) => {
      const data = ev.data || {};

      if (data.type === "request-state") {
        publishState();
        return;
      }

      if (data.type === "state") {
        try {
          const payload = data.payload;
          if (!payload) return;

          restoreFromSnapshot(payload);
          generateTable();
          renderHistory();
          updateAutoButton();
          updateCounter();
          updateDisplay(
            state.ultimoSorteado ? getLetterFromNumber(state.ultimoSorteado) + state.ultimoSorteado : "--",
            state.ultimoSorteado ? getLetterFromNumber(state.ultimoSorteado) : ""
          );
        } catch (e) {
          console.warn("Erro ao sincronizar estado:", e);
        }
      }
    };
  }

  /**
   * Agenda o próximo sorteio automático
   */
  const scheduleNextAuto = () => {
    clearTimeout(autoTimer);
    if (!state.autoMode || state.sorteados.size >= CONFIG.TOTAL_NUMBERS) return;

    autoTimer = setTimeout(() => {
      draw();
    }, state.autoDelayMs);
  };

  /**
   * Reveala o número de forma dramática
   * @param {number} finalNum - Número sorteado
   * @param {string} txt - Texto para exibir
   */
  const dramaticReveal = async (finalNum, txt) => {
    try {
      hideOverlay();
      const roulette = startTableRoulette(
        Math.max(30, Math.floor(CONFIG.TIMING.totalDuration / 40))
      );

      updateDisplay("...", "");

      let numberSpoken = false;

      await dramaticSpeak(["Agora...", "O número é"], (partIndex) => {
        if (partIndex === 1) {
          roulette.stop(finalNum);
          showOverlay(txt);
          updateDisplay(txt, getLetterFromNumber(finalNum));
          markCell(finalNum);
          numberSpoken = true;
        }
      });

      if (!numberSpoken) {
        showOverlay(txt);
        updateDisplay(txt, getLetterFromNumber(finalNum));
        markCell(finalNum);
      }

      try {
        await speakNumber(finalNum);
      } catch (e) {
        await delay(300);
      }

      roulette.stop(finalNum);
      await roulette.promise;
      hideOverlay();
    } catch (e) {
      console.warn("Erro na revelação dramática:", e);
    }
  };

  /**
   * Registra a rodada atual
   */
  const recordCurrentRound = () => {
    try {
      if (state.sorteados.size) {
        state.rodadas.push({
          numero: state.rodadaAtual++,
          sorteados: Array.from(state.sorteados), // Set → Array
          data: new Date().toLocaleString()
        });
        // MELHORIA 4: Salvar no localStorage
        StorageManager.save("rodadas", state.rodadas);
      }
    } catch (e) {
      console.warn("Erro ao registrar rodada:", e);
    }
  };

  /**
   * Função principal de sorteio
   */
  const draw = async () => {
    if (state.rodando) return;
    if (state.sorteados.size >= CONFIG.TOTAL_NUMBERS) return;

    state.rodando = true;
    if (btnSortear) btnSortear.disabled = true;

    try {
      const number = generateRandomNumber();
      state.sorteados.add(number); // Set.add()
      state.ultimoSorteado = number;
      const letter = getLetterFromNumber(number);
      const txt = letter + number;

      addToHistory(txt, letter);
      // CORREÇÃO: Mover updateCounter() para APÓS dramaticReveal()
      await dramaticReveal(number, txt);
      updateCounter(); // Agora atualiza APÓS animação
      publishState();
      // MELHORIA 4: Salvar estado
      StorageManager.save("state", snapshotState());
      scheduleNextAuto();
    } catch (e) {
      console.error("Erro no sorteio:", e);
    } finally {
      state.rodando = false;
      if (btnSortear) btnSortear.disabled = false;
    }
  };

  const repeat = async () => {
    if (state.rodando) return;
    if (!state.ultimoSorteado) return;

    state.rodando = true;
    if (btnSortear) btnSortear.disabled = true;

    try {
      const letter = getLetterFromNumber(state.ultimoSorteado);
      const txt = letter + state.ultimoSorteado;
      await dramaticReveal(state.ultimoSorteado, txt);
    } catch (e) {
      console.error("Erro na repetição:", e);
    } finally {
      state.rodando = false;
      if (btnSortear) btnSortear.disabled = false;
    }
  };

  const toggleMode = () => {
    try {
      state.modo = state.modo === "pc" ? "mobile" : "pc";
      generateTable();
      publishState();
      StorageManager.save("state", snapshotState());
    } catch (e) {
      console.warn("Erro ao alternar modo:", e);
    }
  };

  const toggleAuto = async () => {
    try {
      state.autoMode = !state.autoMode;
      updateAutoButton();

      if (state.autoMode && state.sorteados.size < CONFIG.TOTAL_NUMBERS) {
        const delay_ms = await showDialog("Tempo entre sorteios", {
          min: 0.5,
          max: 120,
          step: 0.5,
          defaultValue: Math.round(state.autoDelayMs / 1000)
        });

        if (delay_ms === null) {
          state.autoMode = false;
          updateAutoButton();
          publishState();
          return;
        }

        state.autoDelayMs = Math.round(delay_ms * 1000);
        scheduleNextAuto();
      } else {
        clearTimeout(autoTimer);
      }

      publishState();
      StorageManager.save("state", snapshotState());
    } catch (e) {
      console.warn("Erro ao alternar auto:", e);
    }
  };

  const newRound = () => {
    try {
      recordCurrentRound();
      state.sorteados.clear(); // Set.clear()
      state.ultimoSorteado = null;
      state.historico = [];
      if (state.autoMode) {
        state.autoMode = false;
        updateAutoButton();
        clearTimeout(autoTimer);
      }
      generateTable();
      renderHistory();
      updateCounter();
      updateDisplay("--", "");
      publishState();
      StorageManager.save("state", snapshotState());
    } catch (e) {
      console.warn("Erro ao iniciar nova rodada:", e);
    }
  };

  const generatePDF = async () => {
    try {
      if (typeof jspdf === "undefined" || !window.jspdf) {
        alert(STRINGS.JSPDF_NOT_FOUND);
        return;
      }

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const pageHeight = doc.internal.pageSize.getHeight();
      const pageWidth = doc.internal.pageSize.getWidth();
      let yPos = 10;

      doc.setFontSize(14);
      doc.text(STRINGS.ORG_NAME, pageWidth / 2, yPos, { align: "center" });
      yPos += 10;

      doc.setFontSize(12);
      doc.text(STRINGS.DOC_TITLE, pageWidth / 2, yPos, { align: "center" });
      yPos += 10;

      doc.setFontSize(10);
      doc.text(STRINGS.EMISSION_DATE + new Date().toLocaleString(), 10, yPos);
      yPos += 10;

      if (!state.rodadas || state.rodadas.length === 0) {
        doc.text(STRINGS.NO_ROUNDS_RECORDED, 10, yPos);
        doc.save("bingo_relatorio.pdf");
        return;
      }

      state.rodadas.forEach((rodada, idx) => {
        if (yPos > pageHeight - 20) {
          doc.addPage();
          yPos = 10;
          doc.setFontSize(10);
          doc.text(STRINGS.CONTINUATION, 10, yPos);
          yPos += 5;
        }

        doc.setFontSize(11);
        doc.text(`${STRINGS.ROUND} ${rodada.numero}`, 10, yPos);
        yPos += 5;

        doc.setFontSize(9);
        doc.text(STRINGS.PERFORMED_AT + rodada.data, 10, yPos);
        yPos += 5;

        doc.text(STRINGS.TOTAL_DRAWN + rodada.sorteados.length, 10, yPos);
        yPos += 5;

        if (rodada.sorteados && rodada.sorteados.length > 0) {
          const numbers = rodada.sorteados.join(", ");
          const lines = doc.splitTextToSize(numbers, pageWidth - 20);
          lines.forEach(line => {
            if (yPos > pageHeight - 20) {
              doc.addPage();
              yPos = 10;
            }
            doc.text(line, 10, yPos);
            yPos += 5;
          });
        } else {
          doc.text(STRINGS.NO_NUMBERS_DRAWN, 10, yPos);
          yPos += 5;
        }

        yPos += 5;
      });

      yPos += 10;
      if (yPos > pageHeight - 40) {
        doc.addPage();
        yPos = 10;
      }

      doc.setFontSize(9);
      doc.text(STRINGS.RESPONSIBLE + "________________________", 10, yPos);
      yPos += 10;
      doc.text(STRINGS.SCHOOL_DIRECTION + "________________________", 10, yPos);
      yPos += 15;

      doc.setFontSize(8);
      doc.text(STRINGS.AUTO_GENERATED, pageWidth / 2, pageHeight - 10, { align: "center" });

      doc.save("bingo_relatorio.pdf");
    } catch (e) {
      console.error("Erro ao gerar PDF:", e);
      alert("Erro ao gerar PDF. Tente novamente.");
    }
  };

  // ========== INICIALIZAÇÃO ==========
  if (btnSortear) btnSortear.addEventListener("click", draw);
  if (btnRepetir) btnRepetir.addEventListener("click", repeat);
  if (btnModo) btnModo.addEventListener("click", toggleMode);
  if (btnAuto) btnAuto.addEventListener("click", toggleAuto);
  if (btnNovo) btnNovo.addEventListener("click", newRound);
  if (btnPDF) btnPDF.addEventListener("click", generatePDF);

  // MELHORIA 3: Atalhos de teclado
  document.addEventListener("keydown", (e) => {
    // Verificar se não está em um input
    if (document.activeElement.tagName === "INPUT") return;

    // Space = Sortear
    if (e.code === "Space" && !state.rodando) {
      e.preventDefault();
      draw();
    }
    // Escape = Parar Auto
    if (e.code === "Escape" && state.autoMode) {
      e.preventDefault();
      state.autoMode = false;
      updateAutoButton();
      clearTimeout(autoTimer);
      publishState();
    }
  });

  // MELHORIA 4: Carregar do localStorage na inicialização
  const savedState = StorageManager.load("state");
  if (savedState) {
    try {
      restoreFromSnapshot(savedState);
    } catch (e) {
      console.warn("Erro ao carregar estado salvo:", e);
    }
  }

  generateTable();
  renderHistory();
  updateCounter();
  updateAutoButton();
});
</script>
</body>
</html>
