<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bingo</title>
<meta name="description" content="Sorteador de bingo com roleta visual, voz e exportação de relatório.">
<meta name="theme-color" content="#000000">

<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
  :root{
    --bg:#000;
    --panel:#111;
    --cell-border:#555;
    --overlay-bg:rgba(0,0,0,0.88);
    --text:#fff;
    --muted:#999;
    --cell-padding: 8px;
    --cell-min-width: 44px;
    --cell-height: 44px;
    --font-display: clamp(60px, 12vw, 160px);
    --overlay-font: 160px;
  }

  body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:var(--bg);
    color:var(--text);
  }

  .topo{
    text-align:center;
    padding:10px;
    background:var(--panel);
  }

  button{
    padding:10px 18px;
    margin:5px;
    border-radius:8px;
    border:1px solid #fff;
    cursor:pointer;
    font-weight:bold;
    background:#fff;
    color:#000;
    transition: background 0.2s ease, color 0.2s ease;
  }

  button.active{
    background:#000;
    color:#fff;
    border-color:#fff;
  }

  button:hover{
    background:#eaeaea;
  }

  .display{
    display:flex;
    align-items:center;
    justify-content:center;
    height:30vh;
    font-weight:bold;
    font-size:var(--font-display);
    color:#fff;
  }

  .historico{
    text-align:center;
    padding:10px;
  }

  .item{
    display:inline-block;
    margin:4px;
    font-size:22px;
    color:#fff;
  }

  table{
    margin:10px auto;
    border-collapse:collapse;
    max-width:95%;
    overflow:auto;
  }

  td, th{
    border:3px solid var(--cell-border);
    padding:var(--cell-padding);
    text-align:center;
    font-weight:bold;
    min-width:var(--cell-min-width);
    height:var(--cell-height);
    color:#fff !important;
    background:rgba(255,255,255,0.04);
    transition:background .12s ease, transform .12s ease, box-shadow .12s ease;
  }

  td.letra{
    background:#111;
    color:#fff;
    width:48px;
  }

  td.destacado{
    background:#fff;
    color:#000 !important;
    box-shadow:0 0 12px rgba(255,255,255,0.5);
  }

  td.roulette{
    background:#d9d9d9;
    color:#000 !important;
    transform:scale(1.08);
    box-shadow:0 0 18px rgba(255,255,255,0.85);
  }

  #overlay{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:var(--overlay-font);
    background:var(--overlay-bg);
    opacity:0;
    pointer-events:none;
    transition:opacity .12s ease, transform .12s ease;
    color:#fff;
    text-shadow:0 6px 24px rgba(0,0,0,0.8);
    z-index:9999;
    transform:scale(.98);
  }

  #overlay.show{
    opacity:1;
    pointer-events:auto;
    transform:scale(1);
  }

  .dialog-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:10000;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.2s ease;
  }

  .dialog-overlay.show{
    opacity:1;
    pointer-events:auto;
  }

  .dialog{
    background:#222;
    border:2px solid #fff;
    border-radius:12px;
    padding:24px;
    max-width:400px;
    width:90%;
    box-shadow:0 8px 32px rgba(0,0,0,0.5);
  }

  .dialog h3{
    margin:0 0 16px 0;
    font-size:18px;
    color:#fff;
  }

  .dialog input{
    width:100%;
    padding:10px;
    margin:12px 0;
    border:1px solid #666;
    border-radius:6px;
    background:#111;
    color:#fff;
    font-size:16px;
    box-sizing:border-box;
  }

  .dialog input:focus{
    outline:none;
    border-color:#fff;
    box-shadow:0 0 8px rgba(255,255,255,0.3);
  }

  .dialog-buttons{
    display:flex;
    gap:12px;
    margin-top:20px;
    justify-content:flex-end;
  }

  .dialog-buttons button{
    padding:10px 16px;
    margin:0;
    flex:1;
    max-width:120px;
  }

  @media (prefers-reduced-motion: reduce){
    * { animation:none !important; transition:none !important; }
  }

  @media (max-width:900px){
    :root {
      --cell-padding: 6px;
      --cell-min-width: 36px;
      --cell-height: 36px;
      --font-display: clamp(48px, 18vw, 120px);
      --overlay-font: 96px;
    }
  }

  @media (max-width:768px){
    .topo{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      padding:12px;
    }

    button{
      padding:14px 12px;
      margin:0;
      font-size:14px;
      min-height:48px;
      width:100%;
    }

    button:hover{
      background:#d4d4d4;
    }
  }

  @media (max-width:600px){
    :root {
      --cell-padding: 5px;
      --cell-min-width: 30px;
      --cell-height: 30px;
      --font-display: clamp(48px, 20vw, 100px);
      --overlay-font: 72px;
    }

    .topo{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      padding:10px;
    }

    button{
      padding:16px 8px;
      font-size:13px;
      min-height:50px;
      width:100%;
      margin:0;
    }

    .item{
      font-size:18px;
      margin:3px;
    }

    table{
      max-width:100%;
      margin:8px auto;
    }

    td.letra{
      width:36px;
    }
  }

  @media (max-width:480px){
    :root {
      --cell-padding: 4px;
      --cell-min-width: 26px;
      --cell-height: 26px;
      --font-display: clamp(36px, 18vw, 100px);
    }

    button{
      padding:14px 6px;
      font-size:12px;
      min-height:48px;
    }

    .display{
      height:18vh;
    }

    .topo{
      gap:6px;
      padding:8px;
    }
  }

  @media (max-width:390px){
    :root {
      --cell-padding: 3px;
      --cell-min-width: 24px;
      --cell-height: 24px;
      --font-display: clamp(36px, 16vw, 80px);
      --overlay-font: 60px;
    }

    .topo{
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      padding: 6px;
    }

    button{
      padding: 12px 4px;
      font-size: 11px;
      min-height: 44px;
      margin: 0;
    }

    .display{
      height: 18vh;
    }

    td.letra{
      width: 32px;
    }

    .item{
      font-size: 16px;
      margin: 2px;
    }

    .dialog{
      max-width: 100%;
      width: 95%;
      padding: 16px;
    }

    .dialog h3{
      font-size: 16px;
      margin-bottom: 12px;
    }

    .dialog input{
      font-size: 16px;
      padding: 12px;
      margin: 10px 0;
    }

    .dialog-buttons{
      gap: 8px;
      margin-top: 16px;
    }

    .dialog-buttons button{
      padding: 10px 12px;
      max-width: 100%;
      flex: 1;
    }
  }

  @media (max-width:320px){
    :root {
      --cell-padding: 2px;
      --cell-min-width: 20px;
      --cell-height: 20px;
      --font-display: clamp(32px, 14vw, 64px);
      --overlay-font: 48px;
    }

    button{
      padding: 10px 2px;
      font-size: 10px;
      min-height: 40px;
    }

    .dialog h3{
      font-size: 14px;
    }
  }
</style>
</head>
<body>
  <div class="topo">
    <button id="btnSortear" aria-label="Sortear um novo número">🎲 Sortear</button>
    <button id="btnRepetir" aria-label="Repetir o último número sorteado">🔁 Repetir</button>
    <button id="btnModo" aria-label="Alternar entre modo desktop e mobile">🖥️ / 📱 Modo</button>
    <button id="btnAuto" aria-label="Ativar modo de sorteio automático">🎤 Auto</button>
    <button id="btnNovo" aria-label="Iniciar uma nova rodada de sorteios">🔄 Nova Rodada</button>
    <button id="btnPDF" aria-label="Exportar relatório em PDF">📄 PDF</button>
  </div>

  <div class="display" id="display" role="status" aria-live="polite">--</div>
  <div class="historico" id="lista" role="region" aria-label="Histórico de números sorteados"></div>
  <table role="grid" aria-label="Tabela de números do bingo"><tbody id="numeros"></tbody></table>
  <div id="overlay" aria-live="assertive" aria-hidden="true" role="status"></div>

  <div id="dialogOverlay" class="dialog-overlay" role="dialog" aria-modal="true">
    <div class="dialog">
      <h3 id="dialogTitle">Tempo entre sorteios</h3>
      <input type="number" id="dialogInput" min="0.5" step="0.5" placeholder="Segundos" aria-label="Tempo em segundos" />
      <div class="dialog-buttons">
        <button id="dialogCancel" aria-label="Cancelar diálogo">Cancelar</button>
        <button id="dialogOk" aria-label="Confirmar entrada">OK</button>
      </div>
    </div>
  </div>

<script>
/**
 * Sistema de gerenciamento de síntese de fala
 */
class SpeechManager {
  constructor() {
    this.isSupported = "speechSynthesis" in window;
  }

  /**
   * Fala um texto
   * @param {string} text - Texto para falar
   * @param {string} lang - Idioma (padrão: pt-BR)
   * @param {number} rate - Velocidade (padrão: 0.8)
   * @returns {Promise<void>}
   */
  async speak(text, lang = "pt-BR", rate = 0.8) {
    if (!this.isSupported) return;
    
    return new Promise((resolve) => {
      try {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = lang;
        utterance.rate = rate;
        utterance.onend = resolve;
        utterance.onerror = () => {
          console.warn("Erro ao falar:", text);
          resolve();
        };
        speechSynthesis.speak(utterance);
      } catch (e) {
        console.warn("Erro ao iniciar fala:", e);
        resolve();
      }
    });
  }

  /**
   * Cancela a fala atual
   */
  cancel() {
    if (this.isSupported) {
      try {
        speechSynthesis.cancel();
      } catch (e) {
        console.warn("Erro ao cancelar fala:", e);
      }
    }
  }
}

/**
 * Gerenciador de cache de elementos DOM
 */
class ElementCache {
  constructor() {
    this.cache = new Map();
  }

  get(id) {
    if (!this.cache.has(id)) {
      const element = document.getElementById(id);
      if (!element) {
        console.warn(`Elemento não encontrado: ${id}`);
      }
      this.cache.set(id, element);
    }
    return this.cache.get(id);
  }

  clear() {
    this.cache.clear();
  }
}

document.addEventListener("DOMContentLoaded", () => {
  // ========== CONSTANTES ==========
  const LETTERS = ["B", "I", "N", "G", "O"];
  const X_POSITIONS = [40, 120, 200, 280, 360];

  const CONFIG = {
    TOTAL_NUMBERS: 75,
    ROWS: 5,
    COLS: 15,
    ANIMATION: { duration: 700, easing: "ease-out" },
    AUDIO: { rate: 0.8 },
    TIMING: {
      totalDuration: 2200,
      letterNumberPause: 180,
      dramaticPause: 220
    },
    HISTORY_SIZE: 5,
    AUTO_DELAY_DEFAULT: 5000,
    ROULETTE_TICK: 60
  };

  const STRINGS = {
    ORG_NAME: "ASSOCIAÇÃO DE PAIS E MESTRES",
    DOC_TITLE: "ATA DE APURAÇÃO DO BINGO",
    EVENT_NAME: "Bingo",
    EMISSION_DATE: "Data/Hora de emissão: ",
    NO_ROUNDS_RECORDED: "Nenhuma rodada foi registrada até o momento.",
    NO_NUMBERS_DRAWN: "Nenhum número sorteado nesta rodada.",
    CONTINUATION: "(continuação)",
    ROUND: "Rodada ",
    PERFORMED_AT: "Realizada em: ",
    TOTAL_DRAWN: "Total de números sorteados: ",
    RESPONSIBLE: "Responsável pela APM",
    SCHOOL_DIRECTION: "Direção Escolar",
    AUTO_GENERATED: "Documento oficial gerado automaticamente para conferência do sorteio.",
    JSPDF_NOT_FOUND: "Biblioteca jsPDF não encontrada.",
    PAGE: "Página ",
    OF: " de ",
    INVALID_TIME: "Informe um valor válido (maior que 0)."
  };

  // ========== STATE ==========
  const state = {
    sorteados: [],
    modo: "pc",
    ultimoSorteado: null,
    rodadas: [],
    rodadaAtual: 1,
    rodando: false,
    autoMode: false,
    autoDelayMs: CONFIG.AUTO_DELAY_DEFAULT,
    historico: []
  };

  // ========== INSTANCES ==========
  const speechManager = new SpeechManager();
  const elementCache = new ElementCache();
  const $ = id => document.getElementById(id);

  // ========== DOM ELEMENTS ==========
  const display = $("display");
  const lista = $("lista");
  const overlay = $("overlay");
  const tbody = $("numeros");
  const btnSortear = $("btnSortear");
  const btnRepetir = $("btnRepetir");
  const btnModo = $("btnModo");
  const btnAuto = $("btnAuto");
  const btnNovo = $("btnNovo");
  const btnPDF = $("btnPDF");

  // ========== BROWSER CAPABILITIES ==========
  const hasBroadcastChannel = "BroadcastChannel" in window;
  const canal = hasBroadcastChannel ? new BroadcastChannel("bingo_bingo_sync") : null;

  // ========== UTILITIES ==========
  const delay = ms => new Promise(r => setTimeout(r, ms));

  /**
   * Retorna a letra (B, I, N, G, O) correspondente ao número
   * @param {number} n - Número de 1 a 75
   * @returns {string} Uma das letras B, I, N, G, O
   */
  const getLetterFromNumber = n => {
    if (n <= 15) return "B";
    if (n <= 30) return "I";
    if (n <= 45) return "N";
    if (n <= 60) return "G";
    return "O";
  };

  /**
   * Gera um número aleatório não sorteado
   * @returns {number} Número entre 1 e 75
   */
  const generateRandomNumber = () => {
    let number;
    do {
      number = Math.floor(Math.random() * CONFIG.TOTAL_NUMBERS) + 1;
    } while (state.sorteados.includes(number));
    return number;
  };

  /**
   * Atualiza o display principal
   * @param {string} txt - Texto a exibir
   * @param {string} cls - Classe CSS (letra)
   */
  const updateDisplay = (txt, cls) => {
    display.innerHTML = `<span class="${cls}">${txt}</span>`;
  };

  /**
   * Renderiza o histórico de números sorteados
   */
  const renderHistory = () => {
    lista.innerHTML = "";
    state.historico.forEach(item => {
      const el = document.createElement("div");
      el.className = "item " + item.cls;
      el.innerText = item.txt;
      lista.appendChild(el);
    });
  };

  /**
   * Adiciona um número ao histórico
   * @param {string} txt - Texto do número
   * @param {string} cls - Classe CSS (letra)
   */
  const addToHistory = (txt, cls) => {
    state.historico.unshift({ txt, cls });
    state.historico = state.historico.slice(0, CONFIG.HISTORY_SIZE);
    renderHistory();
  };

  /**
   * Mostra o overlay com o número
   * @param {string} txt - Número para exibir
   */
  const showOverlay = txt => {
    overlay.textContent = txt;
    overlay.classList.add("show");
    overlay.setAttribute("aria-hidden", "false");
  };

  /**
   * Esconde o overlay
   */
  const hideOverlay = () => {
    overlay.classList.remove("show");
    overlay.setAttribute("aria-hidden", "true");
  };

  /**
   * Mostra um diálogo customizado
   * @param {string} title - Título do diálogo
   * @param {Object} options - Opções { min, max, step, defaultValue }
   * @returns {Promise<number|null>} Valor inserido ou null
   */
  const showDialog = (title, options = {}) => {
    const { min = 0.5, max = 999, step = 0.5, defaultValue = "" } = options;

    return new Promise(resolve => {
      const dialogOverlay = $("dialogOverlay");
      const dialogTitle = $("dialogTitle");
      const dialogInput = $("dialogInput");
      const dialogOk = $("dialogOk");
      const dialogCancel = $("dialogCancel");

      dialogTitle.textContent = title;
      dialogInput.value = defaultValue;
      dialogInput.min = min;
      dialogInput.max = max;
      dialogInput.step = step;

      const cleanup = () => {
        dialogOverlay.classList.remove("show");
        dialogOk.removeEventListener("click", handleOk);
        dialogCancel.removeEventListener("click", handleCancel);
        dialogInput.removeEventListener("keypress", handleKeypress);
      };

      const handleOk = () => {
        const value = parseFloat(dialogInput.value);
        if (isNaN(value) || value < min || value > max) {
          alert(`${STRINGS.INVALID_TIME} (mín: ${min}, máx: ${max})`);
          return;
        }
        cleanup();
        resolve(value);
      };

      const handleCancel = () => {
        cleanup();
        resolve(null);
      };

      const handleKeypress = (e) => {
        if (e.key === "Enter") handleOk();
        if (e.key === "Escape") handleCancel();
      };

      dialogOk.addEventListener("click", handleOk);
      dialogCancel.addEventListener("click", handleCancel);
      dialogInput.addEventListener("keypress", handleKeypress);

      dialogOverlay.classList.add("show");
      setTimeout(() => dialogInput.focus(), 100);
    });
  };

  /**
   * Marca uma célula da tabela como sorteada
   * @param {number} n - Número da célula
   */
  const markCell = (n) => {
    const el = elementCache.get("n" + n);
    if (!el) return;

    el.classList.add("destacado");
    el.classList.remove("roulette");

    try {
      el.animate(
        [
          { transform: "scale(1.08)", boxShadow: "0 0 22px rgba(255,255,255,0.9)" },
          { transform: "scale(1)", boxShadow: "0 0 8px rgba(255,255,255,0.35)" }
        ],
        { duration: CONFIG.ANIMATION.duration, iterations: 1, easing: CONFIG.ANIMATION.easing }
      );
    } catch (e) {
      console.warn("Erro na animação:", e);
    }
  };

  /**
   * Gera a tabela de bingo
   */
  const generateTable = () => {
    let html = "";

    if (state.modo === "pc") {
      for (let l = 0; l < CONFIG.ROWS; l++) {
        html += "<tr><td class='letra'>" + LETTERS[l] + "</td>";
        for (let c = 0; c < CONFIG.COLS; c++) {
          const num = l * CONFIG.COLS + c + 1;
          html += `<td id="n${num}" class="${LETTERS[l]}">${num}</td>`;
        }
        html += "</tr>";
      }
    } else {
      html += "<tr>" + LETTERS.map(h => `<th>${h}</th>`).join("") + "</tr>";
      for (let i = 1; i <= CONFIG.COLS; i++) {
        html += "<tr>";
        html += `<td id="n${i}" class="B">${i}</td>`;
        html += `<td id="n${i + 15}" class="I">${i + 15}</td>`;
        html += `<td id="n${i + 30}" class="N">${i + 30}</td>`;
        html += `<td id="n${i + 45}" class="G">${i + 45}</td>`;
        html += `<td id="n${i + 60}" class="O">${i + 60}</td>`;
        html += "</tr>";
      }
    }

    tbody.innerHTML = html;
    elementCache.clear();
    state.sorteados.forEach(n => {
      const el = elementCache.get("n" + n);
      if (el) el.classList.add("destacado");
    });
  };

  /**
   * Fala partes de forma dramática com pausas
   * @param {string[]} parts - Partes para falar
   * @param {Function} onPartEnd - Callback ao final de cada parte
   * @returns {Promise<void>}
   */
  const dramaticSpeak = async (parts = ["Agora...", "O número é"], onPartEnd = null) => {
    const queue = [...parts];
    let index = 0;

    while (queue.length > 0) {
      const partIndex = index++;
      await speechManager.speak(queue.shift(), "pt-BR", CONFIG.AUDIO.rate);

      if (typeof onPartEnd === "function") {
        try {
          onPartEnd(partIndex);
        } catch (e) {
          console.warn("Erro no callback:", e);
        }
      }

      if (queue.length > 0) {
        await delay(CONFIG.TIMING.dramaticPause);
      }
    }
  };

  /**
   * Fala o número com sua letra
   * @param {number} n - Número para falar
   * @returns {Promise<void>}
   */
  const speakNumber = async (n) => {
    const letterMap = { B: "bê", I: "i", N: "ene", G: "gê", O: "ó" };
    const letter = getLetterFromNumber(n);
    const letterText = letterMap[letter] || letter;

    await speechManager.speak(letterText, "pt-BR", CONFIG.AUDIO.rate);
    await delay(CONFIG.TIMING.letterNumberPause);
    await speechManager.speak(n.toLocaleString("pt-BR"), "pt-BR", CONFIG.AUDIO.rate);
  };

  /**
   * Inicia a roleta visual na tabela
   * @param {number} tickInterval - Intervalo em ms
   * @returns {Object} { promise, stop }
   */
  const startTableRoulette = (tickInterval = CONFIG.ROULETTE_TICK) => {
    let intervalId = null;
    let prevEl = null;
    let stopped = false;
    let resolvePromise;

    const promise = new Promise(r => {
      resolvePromise = r;
    });

    intervalId = setInterval(() => {
      if (stopped) return;
      if (prevEl) prevEl.classList.remove("roulette");

      const num = Math.floor(Math.random() * CONFIG.TOTAL_NUMBERS) + 1;
      const el = elementCache.get("n" + num);
      if (el) {
        el.classList.add("roulette");
        prevEl = el;
      }
    }, tickInterval);

    const stop = (finalNum) => {
      if (stopped) return;
      stopped = true;
      clearInterval(intervalId);

      if (prevEl) prevEl.classList.remove("roulette");

      const finalEl = elementCache.get("n" + finalNum);
      if (finalEl) {
        finalEl.classList.add("roulette");
        setTimeout(() => finalEl.classList.remove("roulette"), 120);
      }

      resolvePromise();
    };

    return { promise, stop };
  };

  /**
   * Cria snapshot do estado
   * @returns {Object} Estado serializado
   */
  const snapshotState = () => ({
    sorteados: [...state.sorteados],
    modo: state.modo,
    ultimoSorteado: state.ultimoSorteado,
    rodadas: state.rodadas.map(r => ({
      numero: r.numero,
      sorteados: [...r.sorteados],
      data: r.data
    })),
    rodadaAtual: state.rodadaAtual,
    historico: state.historico.map(h => ({ txt: h.txt, cls: h.cls })),
    autoMode: state.autoMode,
    autoDelayMs: state.autoDelayMs
  });

  /**
   * Publica o estado para outras abas
   */
  const publishState = () => {
    if (canal) {
      try {
        canal.postMessage({ type: "state", payload: snapshotState() });
      } catch (e) {
        console.warn("Erro ao publicar estado:", e);
      }
    }
  };

  /**
   * Atualiza o botão auto mode
   */
  const updateAutoButton = () => {
    btnAuto.classList.toggle("active", state.autoMode);
    btnAuto.textContent = state.autoMode ? "⏹ Auto" : "🎤 Auto";
  };

  // ========== SYNC ENTRE ABAS ==========
  let autoTimer = null;

  if (canal) {
    canal.onmessage = (ev) => {
      const data = ev.data || {};

      if (data.type === "request-state") {
        publishState();
        return;
      }

      if (data.type === "state") {
        const payload = data.payload;
        if (!payload) return;

        state.sorteados = [...(payload.sorteados || [])];
        state.modo = payload.modo || "pc";
        state.ultimoSorteado = payload.ultimoSorteado ?? null;
        state.rodadas = (payload.rodadas || []).map(r => ({
          numero: r.numero,
          sorteados: [...(r.sorteados || [])],
          data: r.data
        }));
        state.rodadaAtual = payload.rodadaAtual || 1;
        state.historico = (payload.historico || []).map(h => ({ txt: h.txt, cls: h.cls }));
        if (typeof payload.autoMode === "boolean") state.autoMode = payload.autoMode;
        if (typeof payload.autoDelayMs === "number") state.autoDelayMs = payload.autoDelayMs;

        generateTable();
        renderHistory();
        updateAutoButton();
        updateDisplay(
          state.ultimoSorteado ? getLetterFromNumber(state.ultimoSorteado) + state.ultimoSorteado : "--",
          state.ultimoSorteado ? getLetterFromNumber(state.ultimoSorteado) : ""
        );
      }
    };
  }

  /**
   * Agenda o próximo sorteio automático
   */
  const scheduleNextAuto = () => {
    clearTimeout(autoTimer);
    if (!state.autoMode || state.sorteados.length >= CONFIG.TOTAL_NUMBERS) return;

    autoTimer = setTimeout(() => {
      draw();
    }, state.autoDelayMs);
  };

  /**
   * Reveala o número de forma dramática
   * @param {number} finalNum - Número sorteado
   * @param {string} txt - Texto para exibir
   */
  const dramaticReveal = async (finalNum, txt) => {
    hideOverlay();
    const roulette = startTableRoulette(
      Math.max(30, Math.floor(CONFIG.TIMING.totalDuration / 40))
    );

    updateDisplay("...", "");

    let numberSpoken = false;

    await dramaticSpeak(["Agora...", "O número é"], (partIndex) => {
      if (partIndex === 1) {
        roulette.stop(finalNum);
        showOverlay(txt);
        updateDisplay(txt, getLetterFromNumber(finalNum));
        markCell(finalNum);
        numberSpoken = true;
      }
    });

    if (!numberSpoken) {
      showOverlay(txt);
      updateDisplay(txt, getLetterFromNumber(finalNum));
      markCell(finalNum);
    }

    try {
      await speakNumber(finalNum);
    } catch (e) {
      await delay(300);
    }

    roulette.stop(finalNum);
    await roulette.promise;
    hideOverlay();
  };

  /**
   * Registra a rodada atual
   */
  const recordCurrentRound = () => {
    if (state.sorteados.length) {
      state.rodadas.push({
        numero: state.rodadaAtual++,
        sorteados: [...state.sorteados],
        data: new Date().toLocaleString()
      });
    }
  };

  /**
   * Sorteia um número
   */
  const draw = async () => {
    if (state.rodando || state.sorteados.length >= CONFIG.TOTAL_NUMBERS) return;

    if (state.autoMode) {
      clearTimeout(autoTimer);
      autoTimer = null;
    }

    state.rodando = true;
    speechManager.cancel();

    try {
      const number = generateRandomNumber();
      state.sorteados.push(number);
      const txt = getLetterFromNumber(number) + number;

      await dramaticReveal(number, txt);

      state.ultimoSorteado = number;
      updateDisplay(txt, getLetterFromNumber(number));
      addToHistory(txt, getLetterFromNumber(number));

      publishState();

      if (state.sorteados.length >= CONFIG.TOTAL_NUMBERS) {
        state.autoMode = false;
        clearTimeout(autoTimer);
        autoTimer = null;
        updateAutoButton();
        publishState();
      } else if (state.autoMode) {
        scheduleNextAuto();
      }
    } finally {
      state.rodando = false;
    }
  };

  /**
   * Repete o último número sorteado
   */
  const repeatLast = async () => {
    if (!state.ultimoSorteado) return;

    speechManager.cancel();
    const n = state.ultimoSorteado;
    const txt = getLetterFromNumber(n) + n;

    showOverlay(txt);
    try {
      await speakNumber(n);
    } catch (e) {
      await delay(300);
    }
    markCell(n);
    hideOverlay();
  };

  /**
   * Inicia o modo automático
   */
  const startAutoMode = async () => {
    if (state.autoMode) {
      state.autoMode = false;
      clearTimeout(autoTimer);
      autoTimer = null;
      updateAutoButton();
      publishState();
      return;
    }

    const current = Math.max(1, Math.round(state.autoDelayMs / 1000));
    const value = await showDialog(
      "Tempo entre sorteios automáticos (em segundos):",
      { defaultValue: String(current), min: 0.5, max: 999 }
    );

    if (value === null) return;

    state.autoDelayMs = Math.round(value * 1000);
    state.autoMode = true;
    updateAutoButton();
    publishState();

    if (!state.rodando && state.sorteados.length < CONFIG.TOTAL_NUMBERS) {
      draw();
    }
  };

  /**
   * Carrega jsPDF dinamicamente
   * @returns {Promise<Function>} Construtor jsPDF
   */
  const loadjsPDF = async () => {
    if (window.jspdf?.jsPDF) {
      return window.jspdf.jsPDF;
    }
    return new Promise((resolve, reject) => {
      const script = document.createElement("script");
      script.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
      script.onload = () => {
        if (window.jspdf?.jsPDF) {
          resolve(window.jspdf.jsPDF);
        } else {
          reject(new Error("jsPDF não carregou corretamente"));
        }
      };
      script.onerror = () => reject(new Error("Erro ao carregar jsPDF"));
      document.head.appendChild(script);
    });
  };

  /**
   * Exporta relatório em PDF
   */
  const exportPDF = async () => {
    try {
      const jsPDF = await loadjsPDF();
      const doc = new jsPDF({ unit: "pt", format: "a4" });
      const now = new Date();
      const dateTime = now.toLocaleString();
      const W = doc.internal.pageSize.getWidth();
      const H = doc.internal.pageSize.getHeight();
      const M = 40, topY = 40, footerY = H - 30, maxY = footerY - 20;
      let y = topY;

      const rounds = [...state.rodadas];
      if (state.sorteados.length) {
        rounds.push({
          numero: state.rodadaAtual,
          sorteados: [...state.sorteados],
          data: dateTime
        });
      }

      const addNewPage = () => {
        doc.addPage();
        y = topY;
      };

      const drawHeader = () => {
        doc.setFont("helvetica", "bold");
        doc.setFontSize(14);
        doc.text(STRINGS.ORG_NAME, W / 2, y, { align: "center" });
        y += 14;

        doc.setFontSize(13);
        doc.text(STRINGS.DOC_TITLE, W / 2, y, { align: "center" });
        y += 18;

        doc.setFont("helvetica", "normal");
        doc.setFontSize(10);
        doc.text(STRINGS.EMISSION_DATE + dateTime, M, y);
        y += 12;

        doc.text(`Evento: ${STRINGS.EVENT_NAME}`, M, y);
        y += 14;

        doc.setLineWidth(1);
        doc.line(M, y, W - M, y);
        y += 16;

        doc.text(
          "Aos presentes, registra-se abaixo a apuração oficial dos números sorteados durante o evento, organizados por rodada, conforme acompanhamento público realizado.",
          M, y, { maxWidth: W - M * 2 }
        );
        y += 30;
      };

      const drawRoundHeader = (r, isContinuation = false) => {
        doc.setFont("helvetica", "bold");
        doc.setFontSize(12);
        doc.text(
          `${STRINGS.ROUND}${r.numero}${isContinuation ? ` ${STRINGS.CONTINUATION}` : ""}`,
          M, y
        );
        y += 14;

        doc.setFont("helvetica", "normal");
        doc.setFontSize(10);
        doc.text(`${STRINGS.PERFORMED_AT}${r.data}`, M, y);
        y += 14;

        doc.text(`${STRINGS.TOTAL_DRAWN}${r.sorteados.length}`, M, y);
        y += 14;

        doc.setFont("helvetica", "bold");
        LETTERS.forEach((letter, i) => doc.text(letter, X_POSITIONS[i], y));
        y += 12;
      };

      const drawRound = (r) => {
        const groups = { B: [], I: [], N: [], G: [], O: [] };
        r.sorteados.forEach(n => groups[getLetterFromNumber(n)].push(n));
        Object.values(groups).forEach(group => group.sort((a, b) => a - b));

        if (y > maxY - 40) {
          addNewPage();
          drawHeader();
        }
        drawRoundHeader(r);

        const maxLines = Math.max(...LETTERS.map(l => groups[l].length), 0);
        if (!maxLines) {
          doc.setFont("helvetica", "normal");
          doc.setFontSize(10);
          doc.text(STRINGS.NO_NUMBERS_DRAWN, M, y);
          y += 18;
          return;
        }

        for (let i = 0; i < maxLines; i++) {
          if (y > maxY - 20) {
            addNewPage();
            drawHeader();
            drawRoundHeader(r, true);
          }

          doc.setFont("helvetica", "normal");
          doc.setFontSize(10);
          LETTERS.forEach((letter, col) => {
            const num = groups[letter][i];
            if (num !== undefined) doc.text(String(num), X_POSITIONS[col], y);
          });
          y += 12;
        }

        y += 10;
        if (y < maxY) {
          doc.setLineWidth(0.5);
          doc.line(M, y, W - M, y);
          y += 16;
        }
      };

      drawHeader();
      if (!rounds.length) {
        doc.setFont("helvetica", "normal");
        doc.setFontSize(11);
        doc.text(STRINGS.NO_ROUNDS_RECORDED, M, y);
        y += 20;
      } else {
        rounds.forEach(drawRound);
      }

      if (y > maxY - 70) addNewPage();

      doc.setFont("helvetica", "normal");
      doc.setFontSize(10);
      doc.line(80, y + 10, 250, y + 10);
      doc.line(300, y + 10, 470, y + 10);
      doc.text(STRINGS.RESPONSIBLE, 112, y + 24);
      doc.text(STRINGS.SCHOOL_DIRECTION, 342, y + 24);

      const totalPages = doc.internal.getNumberOfPages();
      for (let i = 1; i <= totalPages; i++) {
        doc.setPage(i);
        doc.setFont("helvetica", "normal");
        doc.setFontSize(8);
        doc.line(M, footerY - 6, W - M, footerY - 6);
        doc.text(STRINGS.AUTO_GENERATED, M, footerY + 2);
        doc.text(`${STRINGS.PAGE}${i}${STRINGS.OF}${totalPages}`, W - M - 70, footerY + 2);
      }

      const filename = `ata_bingo_${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, "0")}${String(now.getDate()).padStart(2, "0")}.pdf`;
      doc.save(filename);
    } catch (e) {
      console.error("Erro ao exportar PDF:", e);
      alert(STRINGS.JSPDF_NOT_FOUND);
    }
  };

  // ========== EVENT LISTENERS ==========
  btnSortear.addEventListener("click", draw);
  btnRepetir.addEventListener("click", repeatLast);
  btnModo.addEventListener("click", () => {
    state.modo = state.modo === "pc" ? "tv" : "pc";
    generateTable();
    publishState();
  });
  btnAuto.addEventListener("click", startAutoMode);
  btnNovo.addEventListener("click", () => {
    if (state.rodando) return;
    recordCurrentRound();
    state.sorteados = [];
    generateTable();
    updateDisplay("--", "");
    publishState();
  });
  btnPDF.addEventListener("click", exportPDF);

  // ========== INITIALIZATION ==========
  generateTable();
  updateDisplay("--", "");
});
</script>
</body>
</html>
